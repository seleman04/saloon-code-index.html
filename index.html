<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <!-- ✅ IMPORTANT FOR MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Royal Salon</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            color: #333;
            font-size: 17px;
        }

        header {
            background-color: #111;
            color: white;
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        .main-image img {
            width: 300px;
            border-radius: 10px;
            margin-top: 15px;
        }

        h2 {
            margin-top: 20px;
            color: #b68d40;
        }

        p {
            line-height: 1.6;
        }

        details {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        summary {
            font-weight: bold;
            font-size: 18px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .gallery img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .contact a {
            color: #b68d40;
            text-decoration: none;
            font-weight: bold;
        }

        /* ✅ BETTER FORM SPACING */
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0 15px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        /* ✅ BIGGER BUTTONS */
        button {
            font-size: 18px;
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
        }

        footer {
            margin-top: 30px;
            background: #111;
            color: white;
            text-align: center;
            padding: 15px;
        }

        /* ✅ STICKY BUTTON */
        .sticky-book {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #b68d40;
            color: white;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        @media (max-width: 600px) {
            .gallery img {
                width: 100%;
                height: auto;
            }

            .main-image img {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<header>

</header>

<div class="container">

    <details>

        <p class="contact">

                <br><br>

                📧 Email:
                <a href="mailto:suleimanhb04@gmail.com">Send Email</a>

    <h2>Find Us</h2> <!-- Open in Maps Button --> <a href="https://www.google.com/maps?q=Five Star Hall" target="_blank" style="text-decoration:none;"> <button style=" margin-top:10px; padding:12px 20px; background-color:#4285F4; color:white; border:none; border-radius:6px; cursor:pointer; font-size:16px;"> 📍 Open in Maps 

    </button>
 </a>

<!-- ✅ STICKY BUTTON -->

<script>
const form = document.getElementById("bookingForm");

form.addEventListener("submit", function() {
    const name = form.name.value;
    const phone = form.phone.value;
    const service = form.service.value;
    const date = form.date.value;
    const time = form.time.value;
    const notes = form.notes.value;

    const whatsappURL = `https://wa.me/255786971951?text=Booking:%0AName:${name}%0APhone:${phone}%0AService:${service}%0ADate:${date}%0ATime:${time}%0ANotes:${notes}`;

    window.open(whatsappURL, "_blank");
});
</script>

</body>
</html>
